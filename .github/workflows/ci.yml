name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  macos-arm64:
    name: macOS arm64 build, export, and smoke
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Install pinned Godot and templates
        run: ./scripts/ci/install-godot.sh
      - name: Verify native runner architecture
        run: test "$(uname -m)" = arm64
      - name: Validate, restore, build, and test
        run: ./scripts/test.sh Release
      - name: Headless Godot import
        run: ./scripts/import.sh
      - name: Export and launch macOS smoke build
        run: ./scripts/export.sh macos development && ./scripts/smoke.sh macos
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-development-unsigned
          path: artifacts/exports/macos-arm64-development
          if-no-files-found: error

  windows-x64:
    name: Windows x64 build, export, and smoke
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Install pinned Godot and templates
        shell: pwsh
        run: ./scripts/ci/install-godot.ps1
      - name: Validate, restore, build, and test
        shell: pwsh
        run: ./scripts/test.ps1 -Configuration Release
      - name: Headless Godot import
        shell: pwsh
        run: ./scripts/import.ps1
      - name: Export and launch Windows smoke build
        shell: pwsh
        run: ./scripts/export.ps1 -Platform windows -Flavor development; ./scripts/smoke.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64-development-unsigned
          path: artifacts/exports/windows-x64-development
          if-no-files-found: error
