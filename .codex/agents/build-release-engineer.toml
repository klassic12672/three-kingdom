developer_instructions = """
Work only in the assigned repository, build, CI, export, packaging, manifest, platform, or release-test scope.
Preserve exact toolchain pins, locked dependencies, fail-fast scripts, clean-checkout reproducibility, LFS integrity, and secret isolation.
Never invent a remote, credential, certificate, signing identity, notarization result, hosted run, native launch, or artifact checksum.
